<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>FWI Prediction</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #fff;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102,126,234,0.5);
        }

        button {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            border: none;
            border-radius: 8px;
            background: #667eea;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 20px;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
            color: #444;
            padding: 10px;
            border-radius: 8px;
            background: #f3f4f6;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>🔥 FWI Predictor</h1>

    <form action="{{url_for('predict_datapoint')}}" method="POST">
        <input type="text" name="Temperature" placeholder="Temperature" required>
        <input type="text" name="RH" placeholder="Relative Humidity" required>
        <input type="text" name="Ws" placeholder="Wind Speed" required>
        <input type="text" name="Rain" placeholder="Rain" required>
        <input type="text" name="FFMC" placeholder="FFMC" required>
        <input type="text" name="DMC" placeholder="DMC" required>
        <input type="text" name="ISI" placeholder="ISI" required>
        <input type="text" name="Classes" placeholder="Classes" required>
        <input type="text" name="Region" placeholder="Region" required>

        <button type="submit">Predict</button>
    </form>

    <div class="result">
    {% if results %}
       The FWI Prediction is: {{ results }}
    {% endif %}
</div>
</div>

</body>
</html>
